<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スマート客室リネン計算ツール | Linen Replenishment Calculator</title>
  
  <!-- SEO 基本設定 -->
  <meta name="description" content="ホテルの客室清掃で使用するリネン類の必要数・発注セット数を本日の予定人数と前日残数から瞬時に自動計算。客室清掃の補充管理をミスなくスマート化するプロフェッショナル向けWebツール。">
  <meta name="keywords" content="ホテル清掃, 客室清掃, リネン計算, 補充管理, シーツ, デュベカバー, アメニティ計算, 業務効率化, 宿泊業DX">
  <meta name="author" content="Kouki Nakayama">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://smart-linen-calculator.vercel.app">

  <!-- OGP (Open Graph Protocol) 設定 - SNSシェア時の表示最適化 -->
  <meta property="og:title" content="スマート客室リネン計算ツール">
  <meta property="og:description" content="ホテルの客室清掃で使用するリネン類の必要数・発注セット数を予定人数から瞬時に自動計算。業務効率化と発注ミスを防ぐスマート補充管理ツール。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://smart-linen-calculator.vercel.app">
  <meta property="og:site_name" content="スマート客室リネン計算ツール">
  <meta property="og:image" content="https://smart-linen-calculator.vercel.app/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:locale" content="ja_JP">

  <!-- Twitter Card 設定 -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="スマート客室リネン計算ツール">
  <meta name="twitter:description" content="予定人数から必要なシーツやタオルなどの必要セット数を即座に算出する業務効率化ツール。">
  <meta name="twitter:image" content="https://smart-linen-calculator.vercel.app/og-image.png">

  <!-- ファビコン・アプリアイコン設定 -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  
  <!-- PWA (Progressive Web App) マニフェスト設定 -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#863bff">

  <!-- 構造化データ (JSON-LD) - 検索結果でのリッチスニペット用 -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "スマート客室リネン計算ツール",
    "alternateName": "Smart Linen Replenishment Calculator",
    "url": "https://smart-linen-calculator.vercel.app",
    "image": "https://smart-linen-calculator.vercel.app/og-image.png",
    "description": "ホテルの客室清掃で使用するリネン類の必要数・発注セット数を本日の予定人数と前日残数から瞬時に自動計算。客室清掃の補充管理をミスなくスマート化するプロフェッショナル向けWebツール。",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "All",
    "browserRequirements": "Requires HTML5 compatible browser",
    "author": {
      "@type": "Person",
      "name": "Kouki Nakayama"
    }
  }
  </script>

  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>
      </div>
      <h1>リネン補充管理</h1>
      <p>Linen Replenishment Calculator</p>
    </header>

    <main class="main-content">
      <section class="glass-card input-section">
        <h2>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          基本入力
        </h2>
        
        <div class="form-group people-input-group">
          <label for="peopleCount">本日の予定人数</label>
          <div class="input-with-unit">
            <input type="number" id="peopleCount" min="0" value="0" placeholder="例: 17">
            <span class="unit">人</span>
          </div>
        </div>

        <div class="divider"></div>

        <h2>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
          前日の残数 (ストック)
        </h2>
        
        <div class="inventory-grid">
          <div class="form-group">
            <label for="stock-sheets">シーツ</label>
            <div class="input-with-unit">
              <input type="number" id="stock-sheets" class="stock-input" min="0" value="0">
              <span class="unit">枚</span>
            </div>
          </div>
          <div class="form-group">
            <label for="stock-duvet">デュベカバー</label>
            <div class="input-with-unit">
              <input type="number" id="stock-duvet" class="stock-input" min="0" value="0">
              <span class="unit">枚</span>
            </div>
          </div>
          <div class="form-group">
            <label for="stock-pillow">ピローケース</label>
            <div class="input-with-unit">
              <input type="number" id="stock-pillow" class="stock-input" min="0" value="0">
              <span class="unit">枚</span>
            </div>
          </div>
          <div class="form-group">
            <label for="stock-bathmat">バスマット</label>
            <div class="input-with-unit">
              <input type="number" id="stock-bathmat" class="stock-input" min="0" value="0">
              <span class="unit">枚</span>
            </div>
          </div>
          <div class="form-group">
            <label for="stock-bathtowel">バスタオル</label>
            <div class="input-with-unit">
              <input type="number" id="stock-bathtowel" class="stock-input" min="0" value="0">
              <span class="unit">枚</span>
            </div>
          </div>
          <div class="form-group">
            <label for="stock-facetowel">フェイスタオル</label>
            <div class="input-with-unit">
              <input type="number" id="stock-facetowel" class="stock-input" min="0" value="0">
              <span class="unit">枚</span>
            </div>
          </div>
        </div>

        <button id="calculateBtn" class="primary-btn">
          計算する
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </section>

      <section class="glass-card result-section">
        <h2>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          計算結果
        </h2>
        
        <div class="table-container">
          <table id="resultTable">
            <thead>
              <tr>
                <th>アイテム名</th>
                <th>必要総数</th>
                <th>前日残</th>
                <th>持ってくるセット数</th>
                <th>余る数</th>
              </tr>
            </thead>
            <tbody id="resultBody">
              <!-- 結果がここに挿入されます -->
              <tr class="empty-state-row">
                <td colspan="5">「計算する」ボタンを押すと結果が表示されます</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  
  <script type="module" src="./main.js"></script>
</body>
</html>
